# Reusable Go CI — the klarlabs-studio engineering bar in one place.
#
# Enforces, on every PR and push to main: formatting, golangci-lint
# (with gocritic), race tests, coverage gate (coverctl check), and a
# nox security scan (SARIF -> code scanning). Cost-aware by default:
# concurrency-cancel, setup-go cache, docs-only paths ignored, and the
# macOS/Windows matrix runs only on push-to-main (never on PRs).
#
# Call it from a repo with a thin wrapper (see go-ci-caller-example.yml):
#
#   jobs:
#     ci:
#       uses: klarlabs-studio/.github/.github/workflows/go-ci.yml@main
#       permissions:
#         contents: read
#         security-events: write
#       secrets: inherit
#
# Bump pinned action/tool versions here once; every caller picks it up.
on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version. Empty (default) auto-detects from the repo's go.mod."
        type: string
        default: ""
      golangci-version:
        type: string
        default: "v2.12.2"
      nox-version:
        description: "nox release version (no leading v)."
        type: string
        default: "1.1.0"
      nox-sha256:
        description: "sha256 of nox_<version>_linux_amd64.tar.gz (verify on bump)."
        type: string
        default: "8418e9423f207b4e791700b79076cf9000bfa65dff3b774cabd2c0872a21244b"
      nox-strict:
        description: "Fail on net-new critical/high even before a baseline exists. Default: gate only once a baseline is committed."
        type: boolean
        default: false
      coverage:
        description: "Run the coverctl coverage gate (set false for repos without a threshold yet)."
        type: boolean
        default: true
      cross-platform:
        description: "Add macOS + Windows to the test matrix on push-to-main."
        type: boolean
        default: true
      benchmark:
        description: "Run go test -bench on push-to-main only (off by default to save minutes)."
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # PRs: ubuntu only (macOS = 10x, Windows = 2x runner cost).
        # Push to main: full matrix when cross-platform is enabled.
        os: ${{ (github.event_name != 'pull_request' && inputs.cross-platform) && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          cache: true
      - run: go mod download
      - run: go mod verify
      - name: Test (race + coverage)
        shell: bash
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Coverage gate
        if: inputs.coverage && runner.os == 'Linux'
        run: |
          go install go.klarlabs.de/coverctl@latest
          coverctl check --profile=coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          cache: true
      - name: golangci-lint (gocritic enforced via .golangci.yml)
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: ${{ inputs.golangci-version }}
          args: --timeout=5m ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          cache: true
      - run: go build -v ./...

  security:
    name: Security (nox)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write   # nox annotate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install nox (pinned + sha256-verified binary)
        env:
          NOX_VERSION: ${{ inputs.nox-version }}
          NOX_SHA256: ${{ inputs.nox-sha256 }}
        run: |
          curl -sL -o nox.tar.gz \
            "https://github.com/nox-hq/nox/releases/download/v${NOX_VERSION}/nox_${NOX_VERSION}_linux_amd64.tar.gz"
          echo "${NOX_SHA256}  nox.tar.gz" | sha256sum -c -
          tar xzf nox.tar.gz && sudo mv nox /usr/local/bin/ && nox version
      - name: Install cosign
        # nox verifies plugin signatures by shelling out to cosign. Without
        # it, signed plugins can't be promoted past "unverified" and install
        # is blocked under the default community-trust policy.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Install taint-analysis plugin
        # nox owns code-level SAST: source-to-sink taint (SSRF, injection,
        # path traversal). The plugin is cosign-signed; with cosign present
        # nox promotes it to community trust and installs it (no bypass).
        run: nox plugin install nox/taint-analysis
      - name: Scan
        # Release binaries exit non-zero on any unsuppressed finding; the
        # gate step below decides what is actually fatal (net-new crit/high).
        run: nox scan . -format json,sarif -output nox-results || true
      - name: Upload SARIF to code scanning
        if: always() && hashFiles('nox-results/findings.sarif') != ''
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: nox-results/findings.sarif
      - name: Annotate PR
        if: github.event_name == 'pull_request' && hashFiles('nox-results/findings.json') != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: nox annotate -input nox-results/findings.json || true
      - name: Gate on net-new critical/high findings
        # Self-adjusting: enforce only once the repo has an established nox
        # baseline (at least one finding marked "baselined", or nox-strict
        # set). Un-baselined repos are report-only so adopting the shared
        # workflow never breaks a red build — run `nox baseline add` once to
        # turn enforcement on. Baselined repos gate on net-new crit/high.
        if: always() && hashFiles('nox-results/findings.json') != ''
        env:
          NOX_STRICT: ${{ inputs.nox-strict }}
        run: |
          f=nox-results/findings.json
          baselined=$(jq '[.findings[]? | select(.Status=="baselined")] | length' "$f" 2>/dev/null || echo 0)
          new=$(jq '[.findings[]? | select((.Severity=="critical" or .Severity=="high") and (.Status!="baselined"))] | length' "$f" 2>/dev/null || echo 0)
          echo "net-new critical/high: $new (baselined findings: $baselined)"
          if [ "$baselined" -eq 0 ] && [ "$NOX_STRICT" != "true" ]; then
            echo "::notice::No nox baseline established — security gate is report-only. Run 'nox baseline add' and commit .nox/ to enforce net-new critical/high."
            exit 0
          fi
          if [ "$new" -gt 0 ]; then
            echo "::error::Net-new critical/high findings. Run 'nox baseline add' or remediate."
            jq '.findings[] | select((.Severity=="critical" or .Severity=="high") and (.Status!="baselined")) | {severity:.Severity, rule:.RuleID, file:.Location.FilePath, line:.Location.StartLine}' "$f"
            exit 1
          fi
      - name: Upload nox artifacts
        if: always() && hashFiles('nox-results/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nox-results
          path: nox-results/
          retention-days: 7

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  benchmark:
    name: Benchmark
    if: github.event_name != 'pull_request' && inputs.benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          cache: true
      - run: go test -bench=. -benchmem -run=^$ ./...
