# Reference .golangci.yml for klarlabs-studio Go repos (golangci-lint v2).
# Copy to a repo's root as `.golangci.yml`. gocritic is part of the bar —
# keep it enabled. Add repo-specific exclusions under `exclusions.rules`.
#
# SECURITY NOTE: nox is the primary security tool (secrets, IaC, deps, AI).
# The plan is for nox to also own code-level taint SAST via its
# taint-analysis plugin and for gosec to be dropped here — DEFERRED until
# `nox/taint-analysis` is published at community trust (it is currently
# unverified and -allow-unverified was declined org-wide). Until then gosec
# STAYS ENABLED so taint coverage (SSRF, path traversal, etc.) is not lost.
version: "2"

run:
  timeout: 5m

linters:
  # Mandatory org bar. gocritic is non-negotiable; gosec provides Go
  # code-level security (incl. taint) until nox's taint plugin is verified.
  # gocyclo/dupl are intentionally NOT here (noisy, repo-specific).
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic     # org engineering bar — do not drop
    - gosec        # security; revisit once nox/taint-analysis is verified
  settings:
    gosec:
      excludes:
        # FP-prone rules newly enforced by golangci v2.12.2's bundled gosec
        # (none fired under v2.7.2). Taint (G703/G704/G706) moves to nox once
        # nox/taint-analysis is verified; G115/G118/G204 are high-noise. gosec
        # keeps its stable high-signal rules (creds, crypto, file perms).
        - G115   # integer overflow conversion
        - G118   # context cancellation in goroutine
        - G204   # subprocess with variable
        - G703   # path traversal via taint
        - G704   # SSRF via taint
        - G706   # taint flow
  exclusions:
    rules:
      # Tests legitimately use math/rand (deterministic fixtures, fuzz
      # seeds). G404 weak-RNG does not apply to test code.
      - path: _test\.go
        linters: [gosec]

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
