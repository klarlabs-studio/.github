# Thin caller for the shared klarlabs-studio JS/TS CI bar.
# Drop this in as .github/workflows/ci.yml. All gate logic lives in the
# reusable workflow — bump versions / add jobs there, once, org-wide.
name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]
  pull_request:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: klarlabs-studio/.github/.github/workflows/js-ci.yml@main
    permissions:
      contents: read
      security-events: write
      pull-requests: write   # required — the reusable's nox job annotates PRs
      # packages: read       # uncomment if the repo installs private @klarlabs-studio packages from GitHub Packages
    secrets: inherit
    # with:
    #   package-manager: pnpm     # npm (default) | pnpm | yarn
    #   node-version: "22"        # override the Node version
    #   working-directory: app    # package not at repo root (monorepo)
