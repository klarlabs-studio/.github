# Reference .golangci.yml for klarlabs-studio Go repos (golangci-lint v2).
# Copy to a repo's root as `.golangci.yml`. gocritic is part of the bar —
# keep it enabled. Add repo-specific exclusions under `exclusions.rules`.
version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic     # org engineering bar — do not drop
    - gocyclo
    - gosec
    - dupl

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
