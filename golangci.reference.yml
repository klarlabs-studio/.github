# Reference .golangci.yml for klarlabs-studio Go repos (golangci-lint v2).
# Copy to a repo's root as `.golangci.yml`. gocritic is part of the bar —
# keep it enabled. Add repo-specific exclusions under `exclusions.rules`.
#
# Security is owned by nox (secrets, IaC, deps, AI patterns, and code-level
# SAST incl. cross-file/interprocedural taint via the taint-analysis plugin).
# gosec is intentionally NOT enabled here — golangci stays focused on code
# quality + correctness; nox is the single security tool. See the Security
# job in .github/workflows/go-ci.yml and nox.reference.yaml.
version: "2"

run:
  timeout: 5m

linters:
  # Mandatory org bar — code quality + correctness only. gocritic is
  # non-negotiable. gocyclo/dupl are intentionally NOT here (noisy,
  # repo-specific; opt in per repo). gosec is NOT here — security is nox's.
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic     # org engineering bar — do not drop

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
