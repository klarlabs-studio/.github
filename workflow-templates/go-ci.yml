# Thin caller for the shared klarlabs-studio Go CI bar.
# Drop this in as .github/workflows/ci.yml. All gate logic lives in the
# reusable workflow — bump versions / add jobs there, once, org-wide.
name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]
  pull_request:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: klarlabs-studio/.github/.github/workflows/go-ci.yml@main
    permissions:
      contents: read
      security-events: write
      pull-requests: write   # required — the reusable's nox job annotates PRs
    secrets: inherit
    # with:
    #   coverage: false           # repos without a coverage threshold yet
    #   benchmark: true           # perf-sensitive libs (bolt, fortify)
    #   cross-platform: false     # pure-logic libs (no OS-specific code)
    #   go-version: "1.26.3"      # match go.mod if newer than the 1.25 default
    #   golangci-version: "v2.12.2"  # use a go1.26-built lint binary for go1.26 modules
